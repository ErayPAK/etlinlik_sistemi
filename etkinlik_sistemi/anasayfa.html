    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Dinamik olarak eklenecek etkinlikler için stil */
        .etkinlik-item {
            background-color: #ffffff;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 1.5rem;
            transition: all 0.3s ease-in-out;
            margin-bottom: 1rem; /* Her etkinlik öğesi arasına boşluk ekle */
        }
        .etkinlik-item:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .etkinlik-item h3 {
            font-size: 1.25rem; /* text-xl */
            font-weight: 600; /* font-semibold */
            color: #1a202c; /* gray-900 */
            margin-bottom: 0.5rem;
        }
        .etkinlik-item p {
            color: #4a5568; /* gray-600 */
            margin-bottom: 0.25rem;
        }
        .etkinlik-item span {
            font-weight: 600; /* font-semibold */
        }
        .etkinlik-item img {
            max-width: 100px;
            height: auto;
            border-radius: 0.25rem;
            margin-top: 1rem;
        }
        .sepete-ekle-btn {
            background-image: linear-gradient(to right, #48bb78, #4299e1); /* from-green-400 to-blue-500 */
            color: white;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 9999px; /* rounded-full */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            border: none; /* Add this to remove default button border */
        }
        .sepete-ekle-btn:hover {
            background-image: linear-gradient(to right, #48bb78, #4299e1); /* from-green-500 to-blue-600 */
            opacity: 0.9;
        }
        .sepete-ekle-btn.ogrenci {
            background-image: linear-gradient(to right, #ecc94b, #ed8936); /* from-yellow-400 to-orange-500 */
        }
        .sepete-ekle-btn.ogrenci:hover {
            background-image: linear-gradient(to right, #ecc94b, #ed8936); /* from-yellow-500 to-orange-600 */
            opacity: 0.9;
        }
        .bilet-turu-secimi {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .bilet-turu-secimi input[type="radio"] {
            margin-right: 5px;
        }
    </style>
